# FeedMind.ai Development Environment
# PostgreSQL 16 + Redis 7

services:
  postgres:
    image: postgres:16-alpine
    container_name: feedmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: feedmind
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/provision-roles.sql:/docker-entrypoint-initdb.d/00-provision-roles.sql:ro
      - ./scripts/postgres/init-dev-principals.sql:/docker-entrypoint-initdb.d/10-dev-principals.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feedmind-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
