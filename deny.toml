# cargo-deny policy for rumble-feed-mind.
# Intent: permissive OSS only, no unknown registries, explicit advisory review.

[advisories]
version = 2
yanked = "warn"
ignore = [
  # Temporary waivers accepted in docs/adr/0005-dependency-advisory-waivers.md.
  # Expire on 2026-09-30 or earlier if dependencies are replaced/isolated.
  # Each advisory linked to a removal plan (I1–I7) in 2026-07 wave cleanup chantier.
  "RUSTSEC-2025-0057", # fxhash via scraper → evaluate replacement (I5)
  "RUSTSEC-2026-0174", # http-types via async-stripe → isolate stripe feature (I4)
  "RUSTSEC-2024-0384", # instant via async-stripe → isolate stripe feature (I4)
  "RUSTSEC-2024-0436", # paste via UI dependencies → upgrade UI deps (I6)
  "RUSTSEC-2026-0173", # proc-macro-error2 via UI/validator → upgrade UI deps (I6)
  "RUSTSEC-2026-0194", # quick-xml NsReader via feed-rs 2.3 → resolve feed-rs or constrain quick-xml (I7)
  "RUSTSEC-2026-0195", # quick-xml via feed-rs 2.3 → resolve feed-rs or constrain quick-xml (I7)
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
