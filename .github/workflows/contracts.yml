name: contracts

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  curated-item-export:
    name: CuratedItemExport contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Fixture JSON syntax
        run: |
          set -euo pipefail
          python3 -m json.tool examples/demo-article.json >/dev/null
          python3 -m json.tool examples/demo-rule.json >/dev/null
          python3 -m json.tool examples/expected-curated-export.json >/dev/null
          python3 -m json.tool schemas/curated-item-export.v0.1.schema.json >/dev/null
      - name: Build deterministic CuratedItemExport
        run: |
          set -euo pipefail
          cargo run -p feedmind-cli -- demo-curate \
            --opml examples/demo.opml \
            --article examples/demo-article.json \
            --rule examples/demo-rule.json \
            --output out/curated.json
      - name: Validate contract invariants
        run: cargo run -p feedmind-cli -- validate-curated-export --file out/curated.json
      - name: Golden output must not drift
        run: diff -u examples/expected-curated-export.json out/curated.json

  local-product-proof:
    name: Dioxus curated review proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Verify pinned design-system provenance
        run: python3 scripts/verify-design-system.py
      - name: Test portable contract and projection
        run: cargo test -p feedmind-sync -p feedmind-app
      - name: Compile the real web target
        run: cargo check -p feedmind-domain -p feedmind-sync -p feedmind-app --target wasm32-unknown-unknown --features feedmind-app/web
      - name: Install pinned Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.9 --locked
      - name: Build and verify local bundle
        run: ./scripts/build-feedmind-app.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install Playwright
        run: |
          npm ci --prefix e2e
          cd e2e
          npx playwright install --with-deps chromium firefox webkit
      - name: Run the multi-engine mobile-width browser proof
        run: npm --prefix e2e test
