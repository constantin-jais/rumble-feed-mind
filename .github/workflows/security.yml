name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-supply-chain:
    name: Rust supply-chain gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Secret pattern smoke
        run: |
          set -euo pipefail
          if git grep -nEI '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----)' -- ':!package-lock.json' ':!Cargo.lock' ':!.github/workflows/security.yml'; then
            echo "::error::potential secret pattern found"
            exit 1
          fi
      - name: Log privacy smoke
        run: |
          set -euo pipefail
          if rg -n 'email\s*=\s*%|info!\(to,|customer_id\s*=\s*%|invoice_id\s*=\s*%|payment_method_id\s*=\s*%|subscription_id\s*=\s*%|event_id\s*=\s*%|url\s*=\s*%url|Failed to insert article \{\}' crates/api/src crates/worker/src crates/ingest/src crates/cli/src/main.rs; then
            echo "::error::potential raw PII/payment/feed data in logs"
            exit 1
          fi
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
      - uses: taiki-e/install-action@5626e41434f03ab3022d9685405c0645c879f441 # cargo-audit
      - name: RustSec audit
        run: cargo audit
