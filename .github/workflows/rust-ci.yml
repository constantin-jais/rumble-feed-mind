name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-gates:
    name: Rust quality gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feed_radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d feed_radar_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      FEED_RADAR_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/feed_radar_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets --all-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features
      - name: Curated export demo contract
        run: |
          set -euo pipefail
          cargo run -p feedmind-cli -- demo-curate \
            --opml examples/demo.opml \
            --article examples/demo-article.json \
            --rule examples/demo-rule.json \
            --output out/curated.json
          diff -u examples/expected-curated-export.json out/curated.json
          python3 -m json.tool out/curated.json >/dev/null
          cargo run -p feedmind-cli -- validate-curated-export --file out/curated.json
      - name: Documentation
        run: cargo doc --workspace --all-features --no-deps
