# cargo-audit config — mirrors deny.toml's temporary advisory waivers when cargo-deny sees the same advisory.
# Some cargo-audit advisories may appear before cargo-deny reports them locally; keep those waivers explicit here.
# Remove entries when dependencies are replaced or upstream fixes land.
[advisories]
ignore = [
    "RUSTSEC-2025-0057", # fxhash via scraper
    "RUSTSEC-2026-0174", # http-types via async-stripe
    "RUSTSEC-2024-0384", # instant via async-stripe path
    "RUSTSEC-2024-0436", # paste via UI dependencies
    "RUSTSEC-2026-0173", # proc-macro-error2 via UI/validator dependencies
    "RUSTSEC-2023-0071", # rsa via sqlx-mysql; no RSA private-key decryption boundary in current Postgres-first runtime
    "RUSTSEC-2026-0097", # rand 0.7 via async-stripe/http-types; track with async-stripe replacement/upgrade
    "RUSTSEC-2026-0194", # quick-xml NsReader via feed-rs 2.3; no upstream fix released (feed-rs pins quick-xml 0.37)
    "RUSTSEC-2026-0195", # quick-xml via feed-rs 2.3; same tree as 0194, pending feed-rs bump
]
